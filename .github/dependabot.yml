# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20
    groups:
      python:
        update-types:
          - minor
          - patch

  # Python Dockerfiles — patch updates only
  - package-ecosystem: docker
    directories:
      - compose/local/django/
      - compose/local/docs/
      - compose/production/django/
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    groups:
      docker-python:
        patterns:
          - "*"

  # Infrastructure Dockerfiles
  - package-ecosystem: docker
    directories:
      - compose/local/node/
      - compose/production/aws/
      - compose/production/postgres/
      - compose/production/traefik/
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/Los_Angeles
    commit-message:
      prefix: build
      include: scope
    open-pull-requests-limit: 20
